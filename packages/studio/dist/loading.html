<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAVERNOS Loading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050505;
      --panel: #0B0A08;
      --gold: #D4AF37;
      --gold-soft: #F3D675;
      --gold-deep: #7A5512;
      --line: rgba(212, 175, 55, 0.18);
      --text: #EDE1B0;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
    }

    #app-preview {
      position: fixed;
      inset: 0;
      opacity: 0;
      background:
        radial-gradient(circle at 78% 42%, rgba(212,175,55,.10), transparent 34%),
        linear-gradient(180deg, #0A0A0A 0%, #050505 100%);
      color: #E8E8E8;
      padding: 26px 34px;
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
      animation: appPreviewAppear 0.9s ease 3.78s forwards;
    }

    .mock-top { display: flex; align-items: center; gap: 22px; height: 44px; color: #888; border-bottom: 1px solid rgba(255,255,255,.06); }
    .mock-title { color: #C9B56E; font-size: 20px; letter-spacing: .08em; }
    .mock-tabs { display: flex; gap: 20px; margin-top: 18px; font-size: 14px; color: #777; }
    .mock-tabs span:nth-child(3) { color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 8px; }
    .mock-card { margin-top: 38px; width: 58%; min-height: 150px; border: 1px solid rgba(212,175,55,.18); border-radius: 12px; background: rgba(17,15,11,.78); box-shadow: 0 0 40px rgba(0,0,0,.45); }
    .mock-line { height: 8px; margin: 18px 20px; border-radius: 999px; background: rgba(255,255,255,.08); }
    .mock-line:nth-child(2) { width: 84%; }
    .mock-line:nth-child(3) { width: 76%; }
    .mock-line:nth-child(4) { width: 92%; }
    .mock-btn { margin: 20px; display: inline-block; padding: 8px 16px; border: 1px solid rgba(212,175,55,.38); border-radius: 999px; color: var(--gold); font-size: 12px; }

    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background:
        radial-gradient(circle at 50% 45%, rgba(212,175,55,.09), transparent 30%),
        radial-gradient(circle at 50% 120%, rgba(122,85,18,.25), transparent 45%),
        #050505;
      perspective: 1400px;
      overflow: hidden;
      animation: overlayFadeOut 0.9s ease 4.25s forwards;
    }

    .grain {
      position: absolute;
      inset: -20%;
      opacity: .13;
      background-image:
        linear-gradient(transparent 50%, rgba(255,255,255,.02) 50%),
        linear-gradient(90deg, transparent 50%, rgba(255,255,255,.015) 50%);
      background-size: 4px 4px;
      transform: rotate(3deg);
      pointer-events: none;
    }

    .halo-field {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .halo {
      position: absolute;
      border-radius: 999px;
      filter: blur(44px);
      opacity: .38;
      mix-blend-mode: screen;
      transform: translateZ(0);
    }

    .halo.a { width: 520px; height: 260px; left: 8%; top: 18%; background: radial-gradient(circle, rgba(212,175,55,.20), transparent 68%); animation: haloA 24s ease-in-out infinite; }
    .halo.b { width: 620px; height: 320px; right: -8%; top: 50%; background: radial-gradient(circle, rgba(243,214,117,.15), transparent 70%); animation: haloB 23s ease-in-out infinite; }
    .halo.c { width: 440px; height: 220px; left: 38%; bottom: -6%; background: radial-gradient(circle, rgba(122,85,18,.30), transparent 72%); animation: haloC 19s ease-in-out infinite; }

    @keyframes haloA {
      0%   { transform: translate(0, 0); }
      37.5%  { transform: translate(180px, 90px); }
      70.8%  { transform: translate(-70px, 140px); }
      100%   { transform: translate(0, 0); }
    }
    @keyframes haloB {
      0%   { transform: translate(0, 0); }
      34.8%  { transform: translate(-220px, -70px); }
      73.9%  { transform: translate(80px, -140px); }
      100%   { transform: translate(0, 0); }
    }
    @keyframes haloC {
      0%   { transform: translate(0, 0); }
      36.8%  { transform: translate(-80px, -120px); }
      73.7%  { transform: translate(120px, 60px); }
      100%   { transform: translate(0, 0); }
    }

    .gate {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      pointer-events: none;
      animation: gateFade 0.35s ease 3.55s forwards;
    }

    .gate::before,
    .gate::after {
      content: "";
      position: absolute;
      top: 0;
      width: 50.2%;
      height: 100%;
      background:
        linear-gradient(90deg, rgba(212,175,55,.10), transparent 16%),
        linear-gradient(180deg, #070604, #020202);
      box-shadow: inset 0 0 90px rgba(0,0,0,.9);
      border-color: rgba(212,175,55,.16);
    }
    .gate::before { left: 0; border-right: 1px solid var(--line); transform-origin: left center; }
    .gate::after { right: 0; border-left: 1px solid var(--line); transform-origin: right center; }

    .door-light {
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 100%;
      background: linear-gradient(180deg, transparent, rgba(243,214,117,.95), transparent);
      box-shadow: 0 0 30px rgba(212,175,55,.75), 0 0 120px rgba(212,175,55,.45);
      transform: translateX(-50%) scaleY(.15);
      opacity: 0;
      animation: doorLightP1 1.1s ease 0.15s forwards, doorLightP2 0.55s ease 3.45s forwards;
    }

    @keyframes doorLightP1 {
      to { opacity: 1; transform: translateX(-50%) scaleY(1); }
    }
    @keyframes doorLightP2 {
      to { width: 34vw; opacity: 0.85; }
    }

    .sigil {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(58vw, 760px);
      aspect-ratio: 1;
      transform: translate(-50%, -50%) rotateX(64deg) translateY(120px);
      opacity: 0;
      border: 1px solid rgba(212,175,55,.22);
      border-radius: 50%;
      box-shadow: inset 0 0 60px rgba(212,175,55,.08), 0 0 80px rgba(212,175,55,.06);
      animation: sigilAppear 1.25s ease 0.35s forwards;
    }
    .sigil::before,
    .sigil::after {
      content: "";
      position: absolute;
      inset: 10%;
      border: 1px solid rgba(212,175,55,.18);
      border-radius: 50%;
    }
    .sigil::after { inset: 24%; border-style: dashed; }

    @keyframes sigilAppear {
      to { opacity: 1; transform: translate(-50%, -50%) rotateX(64deg) translateY(0) rotateZ(18deg); }
    }

    .brand-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .brand {
      position: relative;
      display: flex;
      gap: .08em;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(54px, 9vw, 132px);
      font-weight: 700;
      letter-spacing: .13em;
      color: var(--text);
      text-shadow: 0 0 18px rgba(212,175,55,.22);
      transform-style: preserve-3d;
      opacity: 0;
      transform: scale(3.8) translateZ(980px) rotateX(38deg);
      filter: blur(14px);
      animation: brandAppear 1.9s ease 0.65s forwards;
    }

    @keyframes brandAppear {
      to { opacity: 1; transform: scale(1) translateZ(0) rotateX(0deg); filter: blur(0px); }
    }

    .letter {
      position: relative;
      display: inline-block;
      background: linear-gradient(110deg, #6E4C12 0%, #D4AF37 34%, #FFF1A6 50%, #C8941C 68%, #6E4C12 100%);
      background-size: 240% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(212,175,55,.18));
      opacity: 0;
      transform: translateY(36px) rotateY(-35deg);
      animation: letterEntrance 0.75s ease backwards, letterShimmer 1.35s ease backwards;
    }

    /* Stagger entrance + shimmer for each letter (T A V E R N O S) */
    .letter:nth-child(1) { animation-delay: 1.100s, 2.750s; }
    .letter:nth-child(2) { animation-delay: 1.145s, 2.775s; }
    .letter:nth-child(3) { animation-delay: 1.190s, 2.800s; }
    .letter:nth-child(4) { animation-delay: 1.235s, 2.825s; }
    .letter:nth-child(5) { animation-delay: 1.280s, 2.850s; }
    .letter:nth-child(6) { animation-delay: 1.325s, 2.875s; }
    .letter:nth-child(7) { animation-delay: 1.370s, 2.900s; }
    .letter:nth-child(8) { animation-delay: 1.415s, 2.925s; }

    @keyframes letterEntrance {
      to { opacity: 1; transform: translateY(0) rotateY(0deg); }
    }
    @keyframes letterShimmer {
      to { background-position: 220% 0%; }
    }

    .brand-line {
      position: absolute;
      left: 50%;
      bottom: -28px;
      width: 0;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(243,214,117,.9), transparent);
      box-shadow: 0 0 16px rgba(212,175,55,.65);
      animation: brandLineExpand 0.85s ease 2.15s forwards;
    }

    @keyframes brandLineExpand {
      to { width: 112%; }
    }

    .subtitle {
      position: absolute;
      top: calc(50% + 96px);
      left: 50%;
      transform: translateX(-50%);
      color: rgba(212,175,55,.58);
      font-size: 12px;
      letter-spacing: .72em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      animation: subtitleAppear 0.7s ease 2.45s forwards;
    }

    @keyframes subtitleAppear {
      to { opacity: 1; transform: translateX(-50%) translateY(10px); }
    }

    .rune-stream {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .rune {
      position: absolute;
      color: rgba(212,175,55,.35);
      font-family: Georgia, serif;
      font-size: 13px;
      text-shadow: 0 0 12px rgba(212,175,55,.4);
      opacity: 0;
      animation: runeFloat 3.6s ease-in-out infinite alternate;
    }

    @keyframes runeFloat {
      to { opacity: .58; transform: translateY(-28px) rotate(18deg); }
    }

    .flare {
      position: absolute;
      left: -30%;
      top: 0;
      width: 28%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,236,164,.45), transparent);
      transform: skewX(-18deg);
      opacity: 0;
      filter: blur(4px);
      mix-blend-mode: screen;
      animation: flareSweep 0.82s ease 3.15s forwards;
    }

    @keyframes flareSweep {
      to { opacity: 1; left: 120%; }
    }

    @keyframes gateFade {
      to { opacity: 0.35; }
    }

    @keyframes appPreviewAppear {
      to { opacity: 1; }
    }

    @keyframes overlayFadeOut {
      to { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="app-preview">
    <div class="mock-top"><span>&#8249; &#36820;&#22238;</span><span class="mock-title">&#20889;&#20316;</span></div>
    <div class="mock-tabs"><span>&#21019;&#20316;&#24211;</span><span>&#32534;&#36753;&#22120;</span><span>&#20114;&#21160;&#21019;&#20316;</span><span>&#34013;&#22270;</span></div>
    <div class="mock-card">
      <div class="mock-line"></div>
      <div class="mock-line"></div>
      <div class="mock-line"></div>
      <span class="mock-btn">&#20445;&#23384;&#20026;&#31456;&#33410;</span>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="halo-field">
      <div class="halo a"></div>
      <div class="halo b"></div>
      <div class="halo c"></div>
    </div>
    <div class="grain"></div>
    <div class="sigil"></div>
    <div class="door-light"></div>
    <div class="gate" id="gate"></div>
    <div class="rune-stream" id="runes"></div>
    <div class="brand-wrap">
      <div class="brand" id="brand">
        <span class="letter">T</span><span class="letter">A</span><span class="letter">V</span><span class="letter">E</span><span class="letter">R</span><span class="letter">N</span><span class="letter">O</span><span class="letter">S</span>
        <div class="brand-line"></div>
      </div>
    </div>
    <div class="subtitle">THE WRITER'S TAVERN</div>
    <div class="flare"></div>
  </div>

  <script>
    // Generate rune particles with random stagger delays (pure CSS, no GSAP)
    var runeChars = ['\u2726','\u2727','\u25C6','\u25C7','\u273A','\u2739','\u16B1','\u16A8','\u16BE','\u16DF','\u2736','\u2737'];
    var runes = document.getElementById('runes');
    for (var i = 0; i < 46; i++) {
      var el = document.createElement('span');
      el.className = 'rune';
      el.textContent = runeChars[i % runeChars.length];
      el.style.left = (8 + (i * 19) % 86) + '%';
      el.style.top = (12 + (i * 31) % 78) + '%';
      // Random stagger delay to simulate GSAP's stagger.from('random')
      el.style.animationDelay = (Math.random() * 2.4) + 's';
      runes.appendChild(el);
    }

    // Hide overlay after fade-out completes
    window.setTimeout(function() {
      var overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.style.display = 'none';
    }, 5200);
  </script>
</body>
</html>
