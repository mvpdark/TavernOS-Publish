name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '11'

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Job 1: Build Windows installer (NSIS)
  # ─────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Build frontend
        run: cd packages/studio && npx vite build

      - name: Bundle & obfuscate server
        run: node electron/build-server.cjs

      - name: Build Windows app directory
        run: npx electron-builder --dir --win --x64 --publish never

      - name: Build NSIS installer
        run: node electron/build-installer.cjs

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: tavernos-windows-x64
          path: release/TavernOS-Setup-*.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Job 2: Build macOS DMG (Intel x64)
  # ─────────────────────────────────────────────────────────────────────
  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Build frontend
        run: cd packages/studio && npx vite build

      - name: Bundle & obfuscate server
        run: node electron/build-server.cjs

      - name: Generate ICNS icon
        run: |
          python3 -c "
          import struct, os, io
          from PIL import Image
          img = Image.open('electron/build/icon-source.png').convert('RGBA')
          sizes = [(16,b'icp4'),(32,b'icp5'),(64,b'icp6'),(128,b'ic07'),(256,b'ic08'),(512,b'ic09'),(1024,b'ic10')]
          chunks = []
          for s, t in sizes:
              buf = io.BytesIO()
              img.resize((s,s), Image.LANCZOS).save(buf, format='PNG')
              d = buf.getvalue()
              chunks.append(t + struct.pack('>I', len(d)+8) + d)
          h = b'icns' + struct.pack('>I', 8 + sum(len(c) for c in chunks))
          with open('electron/build/icon.icns', 'wb') as f:
              f.write(h)
              for c in chunks: f.write(c)
          print('ICNS generated')
          "

      - name: Build macOS DMG (x64)
        run: npx electron-builder --mac --x64 --publish never
        env:
          # Skip code signing (no certificate in CI)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          TAVERNOS_SKIP_OBFUSCATE: "0"

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tavernos-macos-x64
          path: release/TavernOS-*x64*.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Job 3: Build macOS DMG (Apple Silicon ARM64)
  # ─────────────────────────────────────────────────────────────────────
  build-macos-arm:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Build frontend
        run: cd packages/studio && npx vite build

      - name: Bundle & obfuscate server
        run: node electron/build-server.cjs

      - name: Generate ICNS icon
        run: |
          python3 -c "
          import struct, os, io
          from PIL import Image
          img = Image.open('electron/build/icon-source.png').convert('RGBA')
          sizes = [(16,b'icp4'),(32,b'icp5'),(64,b'icp6'),(128,b'ic07'),(256,b'ic08'),(512,b'ic09'),(1024,b'ic10')]
          chunks = []
          for s, t in sizes:
              buf = io.BytesIO()
              img.resize((s,s), Image.LANCZOS).save(buf, format='PNG')
              d = buf.getvalue()
              chunks.append(t + struct.pack('>I', len(d)+8) + d)
          h = b'icns' + struct.pack('>I', 8 + sum(len(c) for c in chunks))
          with open('electron/build/icon.icns', 'wb') as f:
              f.write(h)
              for c in chunks: f.write(c)
          print('ICNS generated')
          "

      - name: Build macOS DMG (arm64)
        run: npx electron-builder --mac --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          TAVERNOS_SKIP_OBFUSCATE: "0"

      - name: Upload macOS ARM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tavernos-macos-arm64
          path: release/TavernOS-*arm64*.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────
  # Job 4: Build & push Docker image
  # ─────────────────────────────────────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/mvpdark/tavernos:latest
            ghcr.io/mvpdark/tavernos:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────
  # Job 5: Create GitHub Release with all artifacts
  # ─────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos-intel, build-macos-arm, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.dmg" -o -name "*.exe" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TavernOS ${{ github.ref_name }}
          body: |
            ## TavernOS ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `TavernOS-Setup-*-x64.exe`
            - **macOS (Intel)**: `TavernOS-*-x64.dmg`
            - **macOS (Apple Silicon)**: `TavernOS-*-arm64.dmg`
            - **Docker**: `docker pull ghcr.io/mvpdark/tavernos:${{ github.ref_name }}`

            All builds include code obfuscation (RC4 string encoding + control flow flattening).
          files: |
            artifacts/tavernos-windows-x64/*.exe
            artifacts/tavernos-macos-x64/*.dmg
            artifacts/tavernos-macos-arm64/*.dmg
          draft: false
          prerelease: false
